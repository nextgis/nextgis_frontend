<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NGW TMS example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body, #map {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
    </style>
    <script src="../../lib/ngw-leaflet.global.js"></script>
  </head>
  <body>
    <div id="map"></div>
    <script>
      NgwMap.create({
        target: 'map',
        center: [-115.149631, 36.161019],
        zoom: 15,
        osm: true,
      }).then((ngwMap) => {
        ngwMap.addTileLayer(
          'https://demo.nextgis.com/api/component/render/tile?resource=10049,10047,10045,10043&nd=204&z={z}&x={x}&y={y}',
        );
      });
    </script>
  </body>
</html>
